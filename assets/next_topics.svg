<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 880" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="card4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="card5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="card6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="880" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="60" text-anchor="middle" fill="#f8fafc" font-size="38" font-weight="800">🚀 다음 단계 학습 추천 토픽</text>
  <text x="600" y="95" text-anchor="middle" fill="#94a3b8" font-size="18">5가지 핵심 토픽을 마스터했다면 이 12개 토픽으로 실력을 확장해보세요</text>

  <!-- Section 1: 필수 테크닉 (Essential Techniques) -->
  <text x="60" y="155" fill="#fbbf24" font-size="22" font-weight="700">⭐ 필수 테크닉 (Essential Techniques)</text>
  <line x1="60" y1="168" x2="1140" y2="168" stroke="#334155" stroke-width="1"/>

  <!-- Card 1: Hashing -->
  <g filter="url(#shadow)">
    <rect x="60" y="185" width="255" height="140" rx="14" fill="url(#card1)"/>
    <text x="80" y="220" fill="white" font-size="22" font-weight="700">🗂 Hashing</text>
    <text x="80" y="243" fill="white" font-size="14" opacity="0.95" font-weight="600">해시맵 · 해시셋</text>
    <text x="80" y="268" fill="white" font-size="12" opacity="0.9">• O(1) 평균 탐색/삽입</text>
    <text x="80" y="286" fill="white" font-size="12" opacity="0.9">• Two Sum, 중복 검사</text>
    <text x="80" y="304" fill="white" font-size="12" opacity="0.9">• 빈도 세기, 그룹핑</text>
  </g>

  <!-- Card 2: Binary Search -->
  <g filter="url(#shadow)">
    <rect x="335" y="185" width="255" height="140" rx="14" fill="url(#card2)"/>
    <text x="355" y="220" fill="white" font-size="22" font-weight="700">🔍 Binary Search</text>
    <text x="355" y="243" fill="white" font-size="14" opacity="0.95" font-weight="600">이진 탐색</text>
    <text x="355" y="268" fill="white" font-size="12" opacity="0.9">• 정렬된 배열에서 O(log n)</text>
    <text x="355" y="286" fill="white" font-size="12" opacity="0.9">• 파라메트릭 서치</text>
    <text x="355" y="304" fill="white" font-size="12" opacity="0.9">• 답을 이분 탐색</text>
  </g>

  <!-- Card 3: Two Pointers -->
  <g filter="url(#shadow)">
    <rect x="610" y="185" width="255" height="140" rx="14" fill="url(#card3)"/>
    <text x="630" y="220" fill="white" font-size="22" font-weight="700">👉👈 Two Pointers</text>
    <text x="630" y="243" fill="white" font-size="14" opacity="0.95" font-weight="600">투 포인터 &amp; 슬라이딩 윈도우</text>
    <text x="630" y="268" fill="white" font-size="12" opacity="0.9">• 선형 시간 순회</text>
    <text x="630" y="286" fill="white" font-size="12" opacity="0.9">• 부분합, 최장 부분열</text>
    <text x="630" y="304" fill="white" font-size="12" opacity="0.9">• 정렬된 배열 짝 찾기</text>
  </g>

  <!-- Card 4: Backtracking -->
  <g filter="url(#shadow)">
    <rect x="885" y="185" width="255" height="140" rx="14" fill="url(#card4)"/>
    <text x="905" y="220" fill="white" font-size="22" font-weight="700">🔄 Backtracking</text>
    <text x="905" y="243" fill="white" font-size="14" opacity="0.95" font-weight="600">백트래킹</text>
    <text x="905" y="268" fill="white" font-size="12" opacity="0.9">• 순열 · 조합 · 부분집합</text>
    <text x="905" y="286" fill="white" font-size="12" opacity="0.9">• N-Queens, 스도쿠</text>
    <text x="905" y="304" fill="white" font-size="12" opacity="0.9">• 가지치기(pruning)가 핵심</text>
  </g>

  <!-- Section 2: 자료구조 심화 (Advanced Data Structures) -->
  <text x="60" y="375" fill="#22d3ee" font-size="22" font-weight="700">🏗️ 자료구조 심화 (Advanced Data Structures)</text>
  <line x1="60" y1="388" x2="1140" y2="388" stroke="#334155" stroke-width="1"/>

  <!-- Card 5: Heap / Priority Queue -->
  <g filter="url(#shadow)">
    <rect x="60" y="405" width="255" height="140" rx="14" fill="url(#card5)"/>
    <text x="80" y="440" fill="white" font-size="22" font-weight="700">🏔 Heap / PQ</text>
    <text x="80" y="463" fill="white" font-size="14" opacity="0.95" font-weight="600">힙 · 우선순위 큐</text>
    <text x="80" y="488" fill="white" font-size="12" opacity="0.9">• Top-K 문제</text>
    <text x="80" y="506" fill="white" font-size="12" opacity="0.9">• Dijkstra 내부 구조</text>
    <text x="80" y="524" fill="white" font-size="12" opacity="0.9">• Python heapq 모듈</text>
  </g>

  <!-- Card 6: Stack & Queue -->
  <g filter="url(#shadow)">
    <rect x="335" y="405" width="255" height="140" rx="14" fill="url(#card6)"/>
    <text x="355" y="440" fill="white" font-size="22" font-weight="700">📚 Stack &amp; Queue</text>
    <text x="355" y="463" fill="white" font-size="14" opacity="0.95" font-weight="600">스택 · 큐 · 단조 스택</text>
    <text x="355" y="488" fill="white" font-size="12" opacity="0.9">• 괄호 검증, 수식 평가</text>
    <text x="355" y="506" fill="white" font-size="12" opacity="0.9">• 다음 큰 수 (NGE)</text>
    <text x="355" y="524" fill="white" font-size="12" opacity="0.9">• 덱(deque) 활용</text>
  </g>

  <!-- Card 7: Union-Find -->
  <g filter="url(#shadow)">
    <rect x="610" y="405" width="255" height="140" rx="14" fill="url(#card1)"/>
    <text x="630" y="440" fill="white" font-size="22" font-weight="700">🔗 Union-Find</text>
    <text x="630" y="463" fill="white" font-size="14" opacity="0.95" font-weight="600">분리 집합 (DSU)</text>
    <text x="630" y="488" fill="white" font-size="12" opacity="0.9">• 연결 요소 판별</text>
    <text x="630" y="506" fill="white" font-size="12" opacity="0.9">• Kruskal MST 내부</text>
    <text x="630" y="524" fill="white" font-size="12" opacity="0.9">• 경로 압축 + 랭크</text>
  </g>

  <!-- Card 8: Trie -->
  <g filter="url(#shadow)">
    <rect x="885" y="405" width="255" height="140" rx="14" fill="url(#card2)"/>
    <text x="905" y="440" fill="white" font-size="22" font-weight="700">🌲 Trie</text>
    <text x="905" y="463" fill="white" font-size="14" opacity="0.95" font-weight="600">트라이 (접두사 트리)</text>
    <text x="905" y="488" fill="white" font-size="12" opacity="0.9">• 문자열 사전</text>
    <text x="905" y="506" fill="white" font-size="12" opacity="0.9">• 자동완성, 접두사 검색</text>
    <text x="905" y="524" fill="white" font-size="12" opacity="0.9">• 단어 게임 문제</text>
  </g>

  <!-- Section 3: 고급 알고리즘 (Advanced Algorithms) -->
  <text x="60" y="595" fill="#a78bfa" font-size="22" font-weight="700">🎓 고급 알고리즘 (Advanced Algorithms)</text>
  <line x1="60" y1="608" x2="1140" y2="608" stroke="#334155" stroke-width="1"/>

  <!-- Card 9: String Algorithms -->
  <g filter="url(#shadow)">
    <rect x="60" y="625" width="255" height="140" rx="14" fill="url(#card3)"/>
    <text x="80" y="660" fill="white" font-size="22" font-weight="700">🔤 String Algo</text>
    <text x="80" y="683" fill="white" font-size="14" opacity="0.95" font-weight="600">문자열 알고리즘</text>
    <text x="80" y="708" fill="white" font-size="12" opacity="0.9">• KMP, Rabin-Karp</text>
    <text x="80" y="726" fill="white" font-size="12" opacity="0.9">• Z-algorithm</text>
    <text x="80" y="744" fill="white" font-size="12" opacity="0.9">• Manacher (팰린드롬)</text>
  </g>

  <!-- Card 10: Bit Manipulation -->
  <g filter="url(#shadow)">
    <rect x="335" y="625" width="255" height="140" rx="14" fill="url(#card4)"/>
    <text x="355" y="660" fill="white" font-size="22" font-weight="700">0️⃣1️⃣ Bit Manip</text>
    <text x="355" y="683" fill="white" font-size="14" opacity="0.95" font-weight="600">비트 조작</text>
    <text x="355" y="708" fill="white" font-size="12" opacity="0.9">• AND / OR / XOR</text>
    <text x="355" y="726" fill="white" font-size="12" opacity="0.9">• 비트마스크 DP</text>
    <text x="355" y="744" fill="white" font-size="12" opacity="0.9">• 부분집합 순회</text>
  </g>

  <!-- Card 11: Segment Tree -->
  <g filter="url(#shadow)">
    <rect x="610" y="625" width="255" height="140" rx="14" fill="url(#card5)"/>
    <text x="630" y="660" fill="white" font-size="22" font-weight="700">📊 Segment Tree</text>
    <text x="630" y="683" fill="white" font-size="14" opacity="0.95" font-weight="600">세그먼트 · 펜윅 트리</text>
    <text x="630" y="708" fill="white" font-size="12" opacity="0.9">• 구간 합 / 최솟값 쿼리</text>
    <text x="630" y="726" fill="white" font-size="12" opacity="0.9">• O(log n) 업데이트</text>
    <text x="630" y="744" fill="white" font-size="12" opacity="0.9">• Lazy Propagation</text>
  </g>

  <!-- Card 12: Math -->
  <g filter="url(#shadow)">
    <rect x="885" y="625" width="255" height="140" rx="14" fill="url(#card6)"/>
    <text x="905" y="660" fill="white" font-size="22" font-weight="700">🧮 Math</text>
    <text x="905" y="683" fill="white" font-size="14" opacity="0.95" font-weight="600">수학 / 정수론</text>
    <text x="905" y="708" fill="white" font-size="12" opacity="0.9">• GCD / LCM, 유클리드</text>
    <text x="905" y="726" fill="white" font-size="12" opacity="0.9">• 에라토스테네스의 체</text>
    <text x="905" y="744" fill="white" font-size="12" opacity="0.9">• 모듈러 연산 / 조합</text>
  </g>

  <!-- Bottom tip -->
  <rect x="60" y="795" width="1080" height="60" rx="12" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="600" y="822" text-anchor="middle" fill="#fbbf24" font-size="16" font-weight="700">💡 추천 학습 순서</text>
  <text x="600" y="844" text-anchor="middle" fill="#cbd5e1" font-size="13">Hashing → Binary Search → Two Pointers → Heap/PQ → Backtracking → Union-Find → Trie → 나머지 고급 토픽</text>
</svg>
